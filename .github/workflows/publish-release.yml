name: Publish current release tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish, without the v prefix
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify release source
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          test -n "$version"
          test "$REQUESTED_VERSION" = "$version"
          grep -Eq "^## \[${version//./\.}\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md
          if git ls-remote --exit-code --tags origin "refs/tags/v${version}" >/dev/null 2>&1; then
            echo "Tag v${version} already exists; refusing to replace it."
            exit 1
          fi

      - name: Create annotated tag
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          tag="v${version}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "NordVPN Linux Gateway Panel ${tag}"
          git push origin "$tag"

      - name: Dispatch release workflow
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          gh workflow run release.yml --ref main -f version="$version"
