name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python syntax
        run: python3 -m py_compile app.py
      - name: Bash syntax
        run: bash -n gateway.sh install.sh update.sh uninstall.sh
